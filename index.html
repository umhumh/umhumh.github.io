<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMHUMH</title>

<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Pixelify Sans',sans-serif;
    min-height:100vh;
    background:url("paper-bg.png") center/cover;
    overflow-x:hidden;
}

.wrapper{
    width:min(1200px,95%);
    margin:auto;
    padding:30px 0;
}

.center-bg{
    background:url("green-bg.png") center/cover;
    padding:25px;
}

.top{
    display:flex;
    gap:30px;
    align-items:flex-start;
    flex-wrap:wrap;
}

/* PAINT */

.paint{
    background:#c0c0c0;
    border:2px solid #fff;
    box-shadow:
    inset -2px -2px #808080,
    inset 2px 2px #fff;
    width:520px;
}

.paint-header{
    background:#000080;
    color:white;
    padding:6px 10px;
}

.paint img{
    width:100%;
    display:block;
}

/* PROFILE */

.profile{
    width:420px;
    background:#03008f;
    color:white;
    padding:25px;
}

.profile h1{
    font-size:64px;
}

.profile h2{
    font-size:32px;
    margin-bottom:10px;
}

.about{
    background:#d9d9d9;
    color:black;
    padding:12px;
    margin:15px 0;
    font-size:14px;
}

.profile ul{
    list-style:none;
    line-height:1.8;
    font-size:24px;
}

/* BUTTONS */

.links{
    display:flex;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.link-box{
    width:170px;
    height:110px;
    background:#d8ff00;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:black;
    text-decoration:none;
    font-size:24px;
}

/* SOCIAL */

.bottom{
    margin-top:20px;
    display:flex;
    gap:40px;
    flex-wrap:wrap;
}

.socials{
    display:grid;
    grid-template-columns:repeat(2,170px);
    gap:20px;
}

.social{
    width:170px;
    height:170px;
    background:#05009f;
    color:white;
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:72px;
    text-decoration:none;
}

/* MINECRAFT */

.crafting{
    background:#05009f;
    padding:20px;
}

.crafting img{
    max-width:320px;
    display:block;
}

@media(max-width:900px){

.top{
    flex-direction:column;
}

.paint,
.profile{
    width:100%;
}

.socials{
    grid-template-columns:1fr 1fr;
}

.social{
    width:100%;
}

}

</style>
</head>
<body>

<div class="wrapper">

<div class="center-bg">

<div class="top">

<div class="paint">
<div class="paint-header">untitled - Paint</div>

<img src="photo.png" alt="">
</div>

<div>

<div class="profile">

<h1>Ymx Ymx</h1>

<h2>глитч\guy</h2>

<div class="about">
Умх — синтетически созданный наркотик,
расслабляет разум и усиливает творческую активность.
</div>

<ul>
<li>писатель новелл</li>
<li>художник</li>
<li>кодер на питоне</li>
<li>крутой чел</li>
<li>глитч икона</li>
</ul>

</div>

<div class="links">

<a href="#" class="link-box">
how to use<br>glitch\gif
</a>

<a href="#" class="link-box">
pronouns.page
</a>

</div>

</div>

</div>

<div class="bottom">

<div class="socials">

<a href="#" class="social">TGC</a>
<a href="#" class="social">TG</a>
<a href="#" class="social">YT</a>
<a href="#" class="social">TT</a>

</div>

<div class="crafting">
<img src="crafting.png">
</div>

</div>

</div>

</div>

</body>
</html>
